<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Așa este?</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="widget">
            <div class="today-label" id="todayLabel">Today</div>
            <div class="counter" id="counter">0</div>
            <button class="increment-button" onclick="increment()">
                <div class="button-overlay"></div>
                <div class="button-content">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 5v14m-7-7h14"/>
                    </svg>
                    <span>Așa este?</span>
                </div>
            </button>
            <button class="save-button" id="saveButton" type="button">Save today's total</button>
            <div class="status-message" id="statusMessage" aria-live="polite"></div>
            <section class="history-panel">
                <div class="history-header">
                    <h2>Daily history</h2>
                </div>
                <div class="chart" id="chart" aria-label="Counter history chart"></div>
                <div class="history-list" id="historyList"></div>
            </section>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
